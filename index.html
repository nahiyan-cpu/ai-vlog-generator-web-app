<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Vlog Studio Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
.glass { background: rgba(17,24,39,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
body { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const App = () => {
const [step, setStep] = useState(1);
const [keys, setKeys] = useState({ openai: '', elevenlabs: '' });
const [showSettings, setShowSettings] = useState(false);
const [topic, setTopic] = useState('');
const [script, setScript] = useState([]);
const [active, setActive] = useState(0);
const [playing, setPlaying] = useState(false);
const [renderProgress, setRenderProgress] = useState(0);
const synth = window.speechSynthesis;
const playTimeoutRef = useRef(null);

useEffect(() => {
const saved = localStorage.getItem('vlog_keys');
if (saved) setKeys(JSON.parse(saved));
setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
}, []);

useEffect(() => {
if(window.lucide) window.lucide.createIcons();
}, [step, showSettings, playing, active, renderProgress]);

const generateScript = async () => {
if (!topic.trim()) return;
setStep('loading');
if (keys.openai) {
try {
const res = await fetch('https://openai.com', {
method: 'POST',
headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${keys.openai}` },
body: JSON.stringify({
model: "gpt-4o-mini",
response_format: { type: "json_object" },
messages: [{ role: "user", content: `Create JSON: {"scenes": [{"text": "scene line"}]}` }]
})
});
const data = await res.json();
setScript(JSON.parse(data.choices[0].message.content).scenes);
setActive(0); setStep(2); return;
} catch (e) { console.error(e); }
}
setTimeout(() => {
setScript([
{ text: `Hook: Why ${topic} is changing everything we know.` },
{ text: "Body: Deep diving into the core secret behind this amazing process." },
{ text: "CTA: If you like this breakdown, follow for more updates!" }
]);
setActive(0); setStep(2);
}, 1500);
};
const togglePlayback = () => {
if (playing) {
synth.cancel();
if (playTimeoutRef.current) clearTimeout(playTimeoutRef.current);
setPlaying(false);
} else {
setPlaying(true);
let current = active;
const playLoop = () => {
if (current >= script.length) { setPlaying(false); setActive(0); return; }
setActive(current); synth.cancel();
const msg = new SpeechSynthesisUtterance(script[current].text);
msg.onend = () => { current++; playLoop(); };
synth.speak(msg);
};
playLoop();
}
};

const runExportWorkflow = () => {
setStep(3); setRenderProgress(0);
const interval = setInterval(() => {
setRenderProgress((prev) => {
if (prev >= 100) { clearInterval(interval); return 100; }
return prev + 10;
});
}, 250);
};

return (
<div className="max-w-2xl mx-auto p-6 pt-20 min-h-screen flex flex-col justify-between">
<div>
<div className="flex justify-between items-center mb-10">
<h1 className="text-3xl font-black text-white cursor-pointer" onClick={() => setStep(1)}>VLOG<span className="text-indigo-500">GEN</span></h1>
<button onClick={() => { synth.cancel(); setPlaying(false); setShowSettings(true); }} className="p-3 glass rounded-full text-slate-400 hover:text-white"><i data-lucide="settings" className="w-5 h-5"></i></button>
</div>
{showSettings && (
<div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
<div className="glass p-8 rounded-3xl w-full max-w-md">
<h2 className="text-xl font-bold mb-4 text-white">Settings</h2>
<input type="password" className="w-full bg-slate-900 p-4 rounded-xl border border-white/10 mb-6 text-white" placeholder="OpenAI Key" value={keys.openai} onChange={e => setKeys({...keys, openai: e.target.value})} />
<div className="flex gap-4">
<button onClick={() => setShowSettings(false)} className="flex-1 glass py-3 rounded-xl text-slate-400">Cancel</button>
<button onClick={() => { localStorage.setItem('vlog_keys', JSON.stringify(keys)); setShowSettings(false); }} className="flex-1 bg-indigo-600 py-3 rounded-xl text-white">Save</button>
</div>
</div>
</div>
)}
{step === 1 && (
<div className="glass p-8 rounded-3xl space-y-6">
<input className="w-full bg-transparent text-xl p-3 border-b border-white/20 text-white placeholder-slate-600" placeholder="What's your vlog about?" value={topic} onChange={e => setTopic(e.target.value)} />
<button onClick={generateScript} disabled={!topic.trim()} className="w-full bg-white text-black py-4 rounded-xl font-bold">Generate Script</button>
</div>
)}
{step === 'loading' && (
<div className="glass p-12 rounded-3xl text-center space-y-4">
<div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
<p className="text-sm text-slate-400">Assembling scenes...</p>
</div>
)}
{step === 2 && script.length > 0 && (
<div className="glass p-6 rounded-3xl text-center space-y-8 relative">
<div className="py-10"><p className="text-xl italic text-white">"{script[active]?.text}"</p></div>
<div className="flex items-center justify-between border-t border-white/5 pt-6">
<button onClick={togglePlayback} className="p-5 rounded-full bg-indigo-600 text-white shadow-lg">
{playing ? <i data-lucide="pause" className="w-6 h-6"></i> : <i data-lucide="play" className="w-6 h-6"></i>}
</button>
<div className="flex gap-2">
{script.map((s, i) => (
<button key={i} onClick={() => { synth.cancel(); setPlaying(false); setActive(i); }} className={`w-3 h-3 rounded-full ${active === i ? 'bg-indigo-400 scale-125' : 'bg-slate-800'}`}></button>
))}
</div>
<button onClick={runExportWorkflow} className="bg-emerald-600 text-white px-5 py-3 rounded-xl text-xs font-bold">Export MP4</button>
</div>
</div>
)}
{step === 3 && (
<div className="glass p-8 rounded-3xl text-center space-y-6">
<h2 className="text-xl font-bold text-white">{renderProgress < 100 ? 'Rendering...' : 'Complete!'}</h2>
<div className="w-full bg-slate-950 h-3 rounded-full overflow-hidden p-0.5 border border-slate-900">
<div className="h-full bg-gradient-to-r from-emerald-500 to-indigo-500 rounded-full" style={{ width: `${renderProgress}%` }}></div>
</div>
{renderProgress < 100 && <div className="text-xs text-indigo-400">{renderProgress}%</div>}
{renderProgress >= 100 && (
<button onClick={() => {
const payload = `Topic: ${topic}\n\n` + script.map((s, idx) => `[Scene ${idx + 1}]\n${s.text}`).join('\n\n');
const file = new Blob([payload], {type: 'text/plain'});
const a = document.createElement("a");
a.href = URL.createObjectURL(file);
a.download = `vlog-${topic}.mp4`;
a.click();
}} className="w-full bg-gradient-to-r from-indigo-600 to-pink-600 text-white py-3.5 rounded-xl font-bold">Download Final Vlog MP4</button>
)}
</div>
)}
</div>
</div>
);
};
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
