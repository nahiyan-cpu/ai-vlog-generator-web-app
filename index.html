
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Content Studio Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
.glass { background: rgba(17,24,39,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
body { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); min-height: 100vh; }
</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const App = () => {
const [step, setStep] = useState(1);
const [keys, setKeys] = useState({ openai: '', elevenlabs: '' });
const [showSettings, setShowSettings] = useState(false);
const [topic, setTopic] = useState('');
const [script, setScript] = useState([]);
const [active, setActive] = useState(0);
const [playing, setPlaying] = useState(false);
const [seoData, setSeoData] = useState(null);
const [savedProjects, setSavedProjects] = useState([]);
const synth = window.speechSynthesis;
const playTimeoutRef = useRef(null);

useEffect(() => {
const savedKeys = localStorage.getItem('vlog_keys');
if (savedKeys) setKeys(JSON.parse(savedKeys));
const savedProjs = localStorage.getItem('vlog_projects');
if (savedProjs) setSavedProjects(JSON.parse(savedProjs));
setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100);
}, []);

useEffect(() => {
if(window.lucide) window.lucide.createIcons();
}, [step, showSettings, playing, active, seoData, savedProjects]);

const generateScript = async () => {
if (!topic.trim()) return;
setStep('loading');
setTimeout(() => {
const generatedScript = [
{ text: `Hook: Why ${topic} is changing everything we know.` },
{ text: "Body: Deep diving into the core secret behind this amazing process." },
{ text: "CTA: If you like this breakdown, follow for more updates!" }
];
const generatedSeo = {
titles: [
`🔥 This Secret About ${topic} Will Blow Your Mind!`,
`How to Master ${topic} (Step-by-Step Guide)`,
`The Ultimate ${topic} Blueprint Nobody Tells You`
],
tags: `${topic.toLowerCase().replace(/\s+/g, '')}, aitools, viralvlog, contentcreator, tutorial`,
desc: `In this video, we uncover the hidden truths about ${topic}. Make sure to like, comment, and subscribe for more premium tech updates!`
};
const newProject = {
id: Date.now(),
title: topic,
date: new Date().toLocaleDateString(),
script: generatedScript,
seo: generatedSeo
};
const updatedProjects = [newProject, ...savedProjects];
setSavedProjects(updatedProjects);
localStorage.setItem('vlog_projects', JSON.stringify(updatedProjects));
setScript(generatedScript);
setSeoData(generatedSeo);
setActive(0); setStep(2);
}, 1500);
};

const loadProject = (proj) => {
setTopic(proj.title);
setScript(proj.script);
setSeoData(proj.seo);
setActive(0); setStep(2);
};

const deleteProject = (id, e) => {
e.stopPropagation();
const updated = savedProjects.filter(p => p.id !== id);
setSavedProjects(updated);
localStorage.setItem('vlog_projects', JSON.stringify(updated));
};

const togglePlayback = () => {
if (playing) {
synth.cancel();
if (playTimeoutRef.current) clearTimeout(playTimeoutRef.current);
setPlaying(false);
} else {
setPlaying(true);
let current = active;
const playLoop = () => {
if (current >= script.length) { setPlaying(false); setActive(0); return; }
setActive(current); synth.cancel();
const msg = new SpeechSynthesisUtterance(script[current].text);
msg.onend = () => { current++; playLoop(); };
synth.speak(msg);
};
playLoop();
}
};

const copyToClipboard = (text) => {
navigator.clipboard.writeText(text);
alert("Copied to clipboard!");
};

return (
<div className="max-w-2xl mx-auto p-6 pt-20 min-h-screen flex flex-col justify-between">
<div>
<div className="flex justify-between items-center mb-10">
<h1 className="text-3xl font-black text-white cursor-pointer" onClick={() => setStep(1)}>VLOG<span className="text-indigo-500">GEN</span></h1>
<button onClick={() => { synth.cancel(); setPlaying(false); setShowSettings(true); }} className="p-3 glass rounded-full text-slate-400 hover:text-white"><i data-lucide="settings" className="w-5 h-5"></i></button>
</div>
{showSettings && (
<div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
<div className="glass p-8 rounded-3xl w-full max-w-md">
<h2 className="text-xl font-bold mb-4 text-white">Settings</h2>
<input type="password" className="w-full bg-slate-900 p-4 rounded-xl border border-white/10 mb-6 text-white" placeholder="OpenAI Key" value={keys.openai} onChange={e => setKeys({...keys, openai: e.target.value})} />
<div className="flex gap-4">
<button onClick={() => setShowSettings(false)} className="flex-1 glass py-3 rounded-xl text-slate-400">Cancel</button>
<button onClick={() => { localStorage.setItem('vlog_keys', JSON.stringify(keys)); setShowSettings(false); }} className="flex-1 bg-indigo-600 py-3 rounded-xl text-white">Save</button>
</div>
</div>
</div>
)}
{step === 1 && (
<div className="space-y-8 animate-in fade-in duration-200">
<div className="glass p-8 rounded-3xl space-y-6">
<input className="w-full bg-slate-900 p-4 rounded-xl border border-white/10 text-white placeholder-slate-500" placeholder="What's your vlog about?" value={topic} onChange={e => setTopic(e.target.value)} />
<button onClick={generateScript} disabled={!topic.trim()} className="w-full bg-white text-black py-4 rounded-xl font-bold">Generate Script</button>
</div>
{savedProjects.length > 0 && (
<div className="space-y-3">
<h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-1.5"><i data-lucide="folder-heart" className="w-4 h-4 text-indigo-400"></i> Saved Projects</h3>
<div className="grid grid-cols-1 gap-2 max-h-60 overflow-y-auto pr-1">
{savedProjects.map((p) => (
<div key={p.id} onClick={() => loadProject(p)} className="flex justify-between items-center bg-slate-900/40 hover:bg-slate-900 p-4 rounded-2xl border border-white/5 text-sm cursor-pointer transition">
<div className="flex flex-col text-left">
<span className="font-bold text-white truncate max-w-xs">{p.title}</span>
<span className="text-[10px] text-slate-500">{p.date}</span>
</div>
<button onClick={(e) => deleteProject(p.id, e)} className="text-red-400 hover:text-red-300 p-2 hover:bg-slate-950 rounded-xl transition"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
</div>
))}
</div>
</div>
)}
</div>
)}
{step === 'loading' && (
<div className="glass p-12 rounded-3xl text-center space-y-4">
<div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
<p className="text-sm text-slate-400">Assembling scenes...</p>
</div>
)}
{step === 2 && script.length > 0 && (
<div className="glass p-6 rounded-3xl text-center space-y-8 relative">
<div className="py-10"><p className="text-xl italic text-white">"{script[active]?.text}"</p></div>
<div className="flex items-center justify-between border-t border-white/5 pt-6">
<button onClick={togglePlayback} className="p-5 rounded-full bg-indigo-600 text-white shadow-lg">
{playing ? <i data-lucide="pause" className="w-6 h-6"></i> : <i data-lucide="play" className="w-6 h-6"></i>}
</button>
<div className="flex gap-2">
{script.map((s, i) => (
<button key={i} onClick={() => { synth.cancel(); setPlaying(false); setActive(i); }} className={`w-3 h-3 rounded-full ${active === i ? 'bg-indigo-400 scale-125' : 'bg-slate-800'}`}></button>
))}
</div>
<button onClick={() => setStep(3)} className="bg-emerald-600 text-white px-5 py-3 rounded-xl text-xs font-bold">SEO Optimizer</button>
</div>
</div>
)}
{step === 3 && seoData && (
<div className="glass p-6 sm:p-8 rounded-3xl space-y-6 text-left animate-in fade-in duration-200">
<h2 className="text-xl font-bold text-center text-indigo-400">🔥 AI Video SEO Optimizer</h2>
<div className="space-y-3">
<h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">Suggested Viral Titles</h3>
{seoData.titles.map((title, index) => (
<div key={index} className="flex justify-between items-center bg-slate-900/60 p-3 rounded-xl border border-white/5 text-sm">
<span>{title}</span>
<button onClick={() => copyToClipboard(title)} className="text-indigo-400 hover:text-white px-2 py-1 bg-slate-950 rounded text-xs">Copy</button>
</div>
))}
</div>
<div className="space-y-2">
<h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">Viral Tags & Keywords</h3>
<div className="flex justify-between items-center bg-slate-900/60 p-3 rounded-xl border border-white/5 text-sm">
<span className="font-mono text-indigo-300 truncate max-w-md">{seoData.tags}</span>
<button onClick={() => copyToClipboard(seoData.tags)} className="text-indigo-400 hover:text-white px-2 py-1 bg-slate-950 rounded text-xs">Copy</button>
</div>
</div>
<div className="space-y-2">
<h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">Auto Description</h3>
<div className="bg-slate-900/60 p-4 rounded-xl border border-white/5 text-xs relative">
<p className="pr-12 leading-relaxed">{seoData.desc}</p>
<button onClick={() => copyToClipboard(seoData.desc)} className="absolute top-3 right-3 text-indigo-400 hover:text-white px-2 py-1 bg-slate-950 rounded text-xs">Copy</button>
</div>
</div>
<button onClick={() => { setStep(1); setTopic(''); }} className="w-full bg-white text-black font-bold py-3.5 rounded-xl text-sm transition">Create Another Project</button>
</div>
)}
</div>
</div>
);
};
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
